version: '2'

tasks:
  code-checks:
    steps:
      - name: detect-secrets
        when: false
      - name: compliance-checks
        when: false
      - name: static-scan
        when: false
      - name: peer-review
        when: false

  code-build:
    displayName: "Instana Terraform Provider Publish"
    steps:
      - name: build-artifact
        displayName: "Build and publish Terraform provider to GitHub and Terraform Registry"
        image: goreleaser/goreleaser:latest
        securityContext:
          privileged: true
        script: |
          #!/usr/bin/env bash
          set -e
          
          echo "Fetching variables from SPS Environment Properties..."
          export GITHUB_TOKEN=$(get_env GHP_PAT)
          export GPG_FINGERPRINT=$(get_env GPG_FINGERPRINT)
          export GPG_PRIVATE_KEY=$(get_env GPG_PRIVATE_KEY)
          export GPG_PASSPHRASE=$(get_env GPG_PASSPHRASE)
          export TAG=$(get_env TAG)
          
          # 1. Identity Setup
          git config --global user.email "instanacd@instana.com"
          git config --global user.name "instanacd"
          
          # 2. Fix GPG Environment
          # Ensure gpg-agent is installed and available
          apt-get update && apt-get install -y gnupg2 gpg-agent
          
          echo "Verifying GPG and Goreleaser installation..."
          gpg --version
          goreleaser --version
          
          # 3. Configure GPG Agent for Non-Interactive Signing
          # This resolves the 'Configuration error' and 'No agent running' issues
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          
          # Force start the agent
          gpg-connect-agent /bye
          
          # 4. Import GPG Key
          echo "Importing GPG Key..."
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          
          # 5. Semantic Versioning Validation
          echo "Validating semantic versioning format for release tag: $TAG"
          semver_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9A-Za-z-][0-9A-Za-z-]*))*))?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ $TAG =~ $semver_regex ]]; then
              echo "Valid SemVer. Proceeding with release process..."
          else
              echo "Invalid release version format: $TAG. Please adhere to semantic versioning syntax"
              exit 1
          fi
          
          # 6. Ensure Tag Does Not Already Exist
          echo "Ensuring release version v$TAG does not already exist..."
          export RELEASE_VERSION="v$TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
              echo "Release version $RELEASE_VERSION already exists. Aborting release..."
              exit 1
          fi
          
          # 7. Execution
          # For Terraform Registry, we need a real release, not a snapshot.
          # We'll run the full release command. Goreleaser uses GPG_FINGERPRINT and 
          # GPG_PASSPHRASE from the env automatically.
          echo "Starting GoReleaser..."
          goreleaser release --clean

      - name: unit-test
        when: false
      - name: collect-evidence
        when: false
      - name: setup
        when: false



