version: '2'

tasks:
  code-checks:
    steps:
      - name: detect-secrets
        when: false
      - name: compliance-checks
        when: false
      - name: static-scan
        when: false
      - name: peer-review
        when: false

  code-build:
    displayName: "Instana Terraform Provider Publish"
    steps:
      - name: build-artifact
        displayName: "Build and publish Terraform provider to GitHub and Terraform Registry"
        image: goreleaser/goreleaser:latest
        securityContext:
          privileged: true
        script: |
          #!/usr/bin/env bash
          set -e
          
          echo "Fetching variables from SPS Environment Properties..."
          export GITHUB_TOKEN=$(get_env GHP_PAT)
          export GPG_FINGERPRINT=$(get_env GPG_FINGERPRINT)
          export GPG_PRIVATE_KEY=$(get_env GPG_PRIVATE_KEY)
          export GPG_PASSPHRASE=$(get_env GPG_PASSPHRASE)
          export TAG=$(get_env TAG)
          
          echo "Detecting package manager and installing GPG..."
          if command -v apk &> /dev/null; then
              apk add --no-cache gnupg gpg-agent curl go
          elif command -v microdnf &> /dev/null; then
              microdnf install -y gnupg2 gpgme curl golang
          elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y gnupg2 gpg-agent curl golang-go
          fi
          
          git config --global user.email "instanacd@instana.com"
          git config --global user.name "instanacd"
          
          AGENT_PATH=$(which gpg-agent || which gpg-agent2 || echo "/usr/bin/gpg-agent")
          if [ ! -f /usr/bin/gpg-agent ] && [ -f "$AGENT_PATH" ]; then
              ln -s "$AGENT_PATH" /usr/bin/gpg-agent || true
          fi
          
          export GPG_TTY=$(tty || echo "/dev/tty")
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "disable-scdaemon" >> ~/.gnupg/gpg-agent.conf
          
          gpgconf --kill gpg-agent || true
          gpg-agent --daemon --allow-loopback-pinentry || true
          
          echo "Importing GPG Private Key..."
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          
          if ! command -v goreleaser &> /dev/null; then
              echo "Installing GoReleaser..."
              curl -sfL [https://goreleaser.com/static/run](https://goreleaser.com/static/run) | bash -s -- --version v2.0.0
              mv ./goreleaser /usr/local/bin/goreleaser || mv ./goreleaser /usr/bin/goreleaser
          fi
          
          echo "Validating TAG: $TAG"
          if echo "$TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
              echo "Tag is valid."
          else
              echo "Error: TAG '$TAG' is not valid SemVer (X.Y.Z)."; exit 1
          fi
          
          echo "Executing GoReleaser Dry Run..."
          goreleaser release --snapshot --skip=publish --clean

      - name: unit-test
        when: false
      - name: collect-evidence
        when: false
      - name: setup
        when: false



