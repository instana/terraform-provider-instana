version: '2'

tasks:
  code-checks:
    steps:
      - name: detect-secrets
        when: false
      - name: compliance-checks
        when: false
      - name: static-scan
        when: false
      - name: peer-review
        when: false

  code-build:
    displayName: "Instana Terraform Provider Publish"
    steps:
      - name: build-artifact
        displayName: "Build and publish Terraform provider to GitHub and Terraform Registry"
        image: goreleaser/goreleaser:latest
        securityContext:
          privileged: true
        script: |
          #!/usr/bin/env bash
          set -e
          
          # 1. Fetch Variables from SPS Properties
          export GITHUB_TOKEN=$(get_env GHP_PAT)
          export GPG_FINGERPRINT=$(get_env GPG_FINGERPRINT)
          export GPG_PRIVATE_KEY=$(get_env GPG_PRIVATE_KEY)
          export GPG_PASSPHRASE=$(get_env GPG_PASSPHRASE)
          export TAG=$(get_env TAG)
          
          # 2. Tooling Install & Path Alignment
          echo "Hardening GPG environment..."
          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y gnupg2 gpg-agent curl golang-go
          
          # FIX: Map gpg-agent to the specific path the system is complaining about
          AGENT_PATH=$(which gpg-agent || echo "/usr/bin/gpg-agent")
          if [ ! -f /usr/bin/gpg-agent ]; then
              ln -s "$AGENT_PATH" /usr/bin/gpg-agent || true
          fi
          
          # 3. Identity Setup
          git config --global user.email "instanacd@instana.com"
          git config --global user.name "instanacd"
          
          # 4. GPG Configuration for Automation
          export GPG_TTY=$(tty || echo "/dev/tty")
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          
          # Force GPG to use loopback mode (essential for non-interactive passphrase entry)
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          
          # Reset and restart the daemon
          gpgconf --kill gpg-agent || true
          gpg-agent --daemon --allow-loopback-pinentry
          
          # 5. Import Private Key
          echo "Importing GPG Private Key for $GPG_FINGERPRINT..."
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          
          # 6. Ensure GoReleaser is present
          if ! command -v goreleaser &> /dev/null; then
              echo "Installing GoReleaser..."
              curl -sfL https://goreleaser.com/static/run | bash -s -- --version v2.0.0
              mv ./goreleaser /usr/local/bin/goreleaser
          fi
          
          # 7. Semantic Version Validation
          if [[ ! $TAG =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "Error: TAG '$TAG' does not follow SemVer (X.Y.Z)."; exit 1
          fi
          
          # 8. THE DRY RUN
          # This builds binaries and signs them locally to verify the GPG setup works,
          # but it will NOT create a GitHub release or touch the Terraform Registry.
          echo "Executing GoReleaser Dry Run (Snapshot)..."
          goreleaser release --snapshot --skip=publish --clean

      - name: unit-test
        when: false
      - name: collect-evidence
        when: false
      - name: setup
        when: false



